version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: events_db
    restart: always
    env_file:
      - .env
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: events_db
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - events_net

  minio:
    image: minio/minio
    container_name: events_minio
    restart: always
    env_file:
      - .env
    ports:
      - "9011:9000"
      - "9012:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_API_CORS_ALLOW_ORIGIN: https://eventos.softnexus.com.br
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - events_net

  createbuckets:
    image: minio/mc
    container_name: events_createbuckets
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/videos || true;
      /usr/bin/mc mb myminio/thumbnails || true;
      /usr/bin/mc mb myminio/logos || true;
      /usr/bin/mc mb myminio/backgrounds || true;
      /usr/bin/mc anonymous set public myminio/videos;
      /usr/bin/mc anonymous set public myminio/thumbnails;
      /usr/bin/mc anonymous set public myminio/logos;
      /usr/bin/mc anonymous set public myminio/backgrounds;
      exit 0;
      "
    networks:
      - events_net

  api:
    build: ./api
    container_name: events_api
    restart: always
    env_file:
      - .env
    ports:
      - "3011:3000"
    environment:
      - DB_HOST=postgres
      - DB_USER=admin
      - DB_PASSWORD=admin123
      - DB_NAME=events_db
      - DB_PORT=5432
      - CORS_ORIGIN=https://eventos.softnexus.com.br
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=true
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_PUBLIC_HOST=arquivos-eventos.softnexus.com.br
      - MINIO_PUBLIC_PORT=443
      - JWT_SECRET=softnexus_segredo_2026
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      createbuckets:
        condition: service_completed_successfully
    networks:
      - events_net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://api-eventos.softnexus.com.br/api
    container_name: events_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "8091:80"
    depends_on:
      - api
    networks:
      - events_net

volumes:
  postgres_data:
  minio_data:

networks:
  events_net:
    driver: bridge
